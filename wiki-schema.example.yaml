schema_version: "1"
page_types:
  - id: hub
    required_frontmatter_keys:
      - source_refs
      - compiled_at
      - compiler_revision
    required_outbound_link_patterns:
      - "^\\.\\./sources/"
  - id: article
    required_frontmatter_keys:
      - source_refs
      - compiled_at
      - compiler_revision
    required_outbound_link_patterns: []
required_hub_pages:
  - index.md
  - topics/overview.md
